<!DOCTYPE html>
<html>
   <head>
      <title> Registration Form </title>
   </head>
   <style type="text/css">
      .a{

         background-color: #ffc107;
         border: 1px solid;
         width: 900px;
         height: 700px;
         float: center;
            
      }
   </style>
   <body>
      <center>
      <div class="a">
      <h3> User Registration Form </h3>
      <form>
         <label for="fname"> <b> First Name </b> </label> <br/> 
         <input type="text" name="fname"> <br/>
         <label for="lname"> <b> Last Name </b> </label> <br/> 
         <input type="text" name="lname"> <br/>
         <label for="email"> <b> Email </b> </label> <br/>
         <input type="email" name="email"> <br/>
         <label for="passd"> <b> Enter Password </b> </label> <br/>
         <input type="password" name="passd"> <br/>
         <label for="rpassd"> <b> Retype Password </b> </label> <br/>
         <input type="password" name="rpassd"> <br/>
         <button onclick="alert('Registration Complete')">Submit</button>
      </form>
      </div>  
      </center>       
   </body>
</html>
